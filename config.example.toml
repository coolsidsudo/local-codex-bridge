[server]
host = "127.0.0.1"
port = 8765

# Where bridge task logs are stored.
task_dir = "~/.local-codex-bridge/tasks"

# Default local Codex binary.
codex_bin = "codex"

# Default model passed to local Codex. Change if your local CLI exposes a different id.
default_model = "gpt-5.5"

# Optional additional args appended after `codex exec`.
default_codex_args = ["--json"]

# Example project profile. Replace this with your own local repo.
[projects.example]
name = "Example Project"
path = "~/Projects/example-project"
default_model = "gpt-5.5"

# Verification commands are allowlisted by key.
# They run with shell=False. Each command is an argv array.
[projects.example.verification]
git_status = ["git", "status", "--short", "--branch"]
pytest = ["python", "-m", "pytest"]

