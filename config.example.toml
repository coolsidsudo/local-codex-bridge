[server]
host = "127.0.0.1"
port = 8765

# Optional public HTTPS origin for authenticated deployments.
# Leave empty/unset for local loopback development. For oidc_proxy, set this
# to your real HTTPS tunnel/domain only, without /mcp, query, or fragment.
# public_base_url = "https://YOUR-REAL-TUNNEL-OR-DOMAIN"

# Where bridge task logs are stored.
task_dir = "~/.local-codex-bridge/tasks"

# Default local Codex binary.
codex_bin = "codex"

# Default model passed to local Codex. Change if your local CLI exposes a different id.
default_model = "gpt-5.5"

# Optional additional args appended after `codex exec`.
default_codex_args = ["--json"]


# Authentication defaults to auto: no auth is allowed only for loopback local use
# with no public_base_url. Public/tunnel deployment must configure auth.
[auth]
mode = "auto"

# Recommended public ChatGPT-compatible mode. Values containing example.com or
# YOUR-... are placeholders and do not exist. Replace them with your real HTTPS
# tunnel/domain and OIDC provider values.
#
# mode = "oidc_proxy"
# provider_config_url = "https://YOUR-IDP/.well-known/openid-configuration"
# oidc_scopes = ["openid"]
# client_id_env = "LCB_OIDC_CLIENT_ID"
# client_secret_env = "LCB_OIDC_CLIENT_SECRET"
#
# What values go where:
# - server.public_base_url: real HTTPS tunnel/domain, without /mcp
# - ChatGPT connector URL: {public_base_url}/mcp
# - IdP redirect URI: {public_base_url}/auth/callback
# - oidc_scopes: non-secret OIDC scopes; default is ["openid"]
#   Add "email" and/or "profile" only if your provider policy requires them.
# - env vars: OIDC client ID and client secret
#
# Static bearer is for local/internal/test clients only. It is not the
# recommended public ChatGPT-compatible auth mode. Set the token value in the
# environment, never in this TOML file.
#
# mode = "static_bearer"
# token_env = "LCB_AUTH_TOKEN"
# client_id = "local-codex-bridge-static"
# required_scopes = ["lcb:read"]
# token_scopes = ["lcb:read", "lcb:write"]

# Example project profile. Replace this with your own local repo.
[projects.example]
name = "Example Project"
path = "~/Projects/example-project"
default_model = "gpt-5.5"

# Verification commands are allowlisted by key.
# They run with shell=False. Each command is an argv array.
[projects.example.verification]
git_status = ["git", "status", "--short", "--branch"]
pytest = ["python", "-m", "pytest"]

# Add more projects by creating additional [projects.<id>] sections.
